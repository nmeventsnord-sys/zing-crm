openapi: 3.1.0
info:
  title: Api
  version: 0.1.0
  description: Zing CRM API
servers:
  - url: /api
    description: Base API path
tags:
  - name: health
    description: Health operations
  - name: contacts
    description: Contact management
  - name: companies
    description: Company management
  - name: deals
    description: Deal/pipeline management
  - name: activities
    description: Activity tracking
  - name: dashboard
    description: Dashboard and analytics

paths:
  /healthz:
    get:
      operationId: healthCheck
      tags: [health]
      summary: Health check
      description: Returns server health status
      responses:
        "200":
          description: Healthy
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/HealthStatus"

  # Contacts
  /contacts:
    get:
      operationId: listContacts
      tags: [contacts]
      summary: List all contacts
      parameters:
        - name: search
          in: query
          schema:
            type: string
        - name: status
          in: query
          schema:
            type: string
        - name: companyId
          in: query
          schema:
            type: integer
      responses:
        "200":
          description: List of contacts
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Contact"
    post:
      operationId: createContact
      tags: [contacts]
      summary: Create a contact
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateContactBody"
      responses:
        "201":
          description: Created contact
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Contact"

  /contacts/recent:
    get:
      operationId: getRecentContacts
      tags: [contacts]
      summary: Get recently added contacts
      parameters:
        - name: limit
          in: query
          schema:
            type: integer
      responses:
        "200":
          description: Recent contacts
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Contact"

  /contacts/{id}:
    get:
      operationId: getContact
      tags: [contacts]
      summary: Get a contact by ID
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Contact
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Contact"
        "404":
          description: Not found
    patch:
      operationId: updateContact
      tags: [contacts]
      summary: Update a contact
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UpdateContactBody"
      responses:
        "200":
          description: Updated contact
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Contact"
        "404":
          description: Not found
    delete:
      operationId: deleteContact
      tags: [contacts]
      summary: Delete a contact
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "204":
          description: Deleted

  # Companies
  /companies:
    get:
      operationId: listCompanies
      tags: [companies]
      summary: List all companies
      parameters:
        - name: search
          in: query
          schema:
            type: string
      responses:
        "200":
          description: List of companies
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Company"
    post:
      operationId: createCompany
      tags: [companies]
      summary: Create a company
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateCompanyBody"
      responses:
        "201":
          description: Created company
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Company"

  /companies/{id}:
    get:
      operationId: getCompany
      tags: [companies]
      summary: Get a company by ID
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Company
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Company"
        "404":
          description: Not found
    patch:
      operationId: updateCompany
      tags: [companies]
      summary: Update a company
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UpdateCompanyBody"
      responses:
        "200":
          description: Updated company
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Company"
        "404":
          description: Not found
    delete:
      operationId: deleteCompany
      tags: [companies]
      summary: Delete a company
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "204":
          description: Deleted

  # Deals
  /deals:
    get:
      operationId: listDeals
      tags: [deals]
      summary: List all deals
      parameters:
        - name: stage
          in: query
          schema:
            type: string
        - name: contactId
          in: query
          schema:
            type: integer
        - name: companyId
          in: query
          schema:
            type: integer
      responses:
        "200":
          description: List of deals
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Deal"
    post:
      operationId: createDeal
      tags: [deals]
      summary: Create a deal
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateDealBody"
      responses:
        "201":
          description: Created deal
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Deal"

  /deals/by-stage:
    get:
      operationId: getDealsByStage
      tags: [deals]
      summary: Get deals grouped by stage with totals
      responses:
        "200":
          description: Deals by stage
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/DealStageGroup"

  /deals/{id}:
    get:
      operationId: getDeal
      tags: [deals]
      summary: Get a deal by ID
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Deal
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Deal"
        "404":
          description: Not found
    patch:
      operationId: updateDeal
      tags: [deals]
      summary: Update a deal
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UpdateDealBody"
      responses:
        "200":
          description: Updated deal
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Deal"
        "404":
          description: Not found
    delete:
      operationId: deleteDeal
      tags: [deals]
      summary: Delete a deal
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "204":
          description: Deleted

  # Activities
  /activities:
    get:
      operationId: listActivities
      tags: [activities]
      summary: List all activities
      parameters:
        - name: contactId
          in: query
          schema:
            type: integer
        - name: dealId
          in: query
          schema:
            type: integer
        - name: type
          in: query
          schema:
            type: string
      responses:
        "200":
          description: List of activities
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Activity"
    post:
      operationId: createActivity
      tags: [activities]
      summary: Create an activity
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateActivityBody"
      responses:
        "201":
          description: Created activity
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Activity"

  /activities/{id}:
    patch:
      operationId: updateActivity
      tags: [activities]
      summary: Update an activity
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UpdateActivityBody"
      responses:
        "200":
          description: Updated activity
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Activity"
        "404":
          description: Not found
    delete:
      operationId: deleteActivity
      tags: [activities]
      summary: Delete an activity
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "204":
          description: Deleted

  # Dashboard
  /dashboard/summary:
    get:
      operationId: getDashboardSummary
      tags: [dashboard]
      summary: Get dashboard summary metrics
      responses:
        "200":
          description: Dashboard summary
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/DashboardSummary"

components:
  schemas:
    HealthStatus:
      type: object
      properties:
        status:
          type: string
      required:
        - status

    Contact:
      type: object
      properties:
        id:
          type: integer
        firstName:
          type: string
        lastName:
          type: string
        email:
          type: ["string", "null"]
        phone:
          type: ["string", "null"]
        companyId:
          type: ["integer", "null"]
        companyName:
          type: ["string", "null"]
        status:
          type: string
          enum: [lead, prospect, customer, churned]
        notes:
          type: ["string", "null"]
        createdAt:
          type: string
          format: date-time
        updatedAt:
          type: string
          format: date-time
      required:
        - id
        - firstName
        - lastName
        - status
        - createdAt
        - updatedAt

    CreateContactBody:
      type: object
      properties:
        firstName:
          type: string
        lastName:
          type: string
        email:
          type: ["string", "null"]
        phone:
          type: ["string", "null"]
        companyId:
          type: ["integer", "null"]
        status:
          type: string
          enum: [lead, prospect, customer, churned]
        notes:
          type: ["string", "null"]
      required:
        - firstName
        - lastName
        - status

    UpdateContactBody:
      type: object
      properties:
        firstName:
          type: string
        lastName:
          type: string
        email:
          type: ["string", "null"]
        phone:
          type: ["string", "null"]
        companyId:
          type: ["integer", "null"]
        status:
          type: string
          enum: [lead, prospect, customer, churned]
        notes:
          type: ["string", "null"]

    Company:
      type: object
      properties:
        id:
          type: integer
        name:
          type: string
        industry:
          type: ["string", "null"]
        website:
          type: ["string", "null"]
        size:
          type: ["string", "null"]
        notes:
          type: ["string", "null"]
        createdAt:
          type: string
          format: date-time
        updatedAt:
          type: string
          format: date-time
      required:
        - id
        - name
        - createdAt
        - updatedAt

    CreateCompanyBody:
      type: object
      properties:
        name:
          type: string
        industry:
          type: ["string", "null"]
        website:
          type: ["string", "null"]
        size:
          type: ["string", "null"]
        notes:
          type: ["string", "null"]
      required:
        - name

    UpdateCompanyBody:
      type: object
      properties:
        name:
          type: string
        industry:
          type: ["string", "null"]
        website:
          type: ["string", "null"]
        size:
          type: ["string", "null"]
        notes:
          type: ["string", "null"]

    Deal:
      type: object
      properties:
        id:
          type: integer
        title:
          type: string
        value:
          type: ["number", "null"]
        stage:
          type: string
          enum: [prospecting, qualification, proposal, negotiation, closed_won, closed_lost]
        contactId:
          type: ["integer", "null"]
        contactName:
          type: ["string", "null"]
        companyId:
          type: ["integer", "null"]
        companyName:
          type: ["string", "null"]
        closeDate:
          type: ["string", "null"]
          format: date
        notes:
          type: ["string", "null"]
        createdAt:
          type: string
          format: date-time
        updatedAt:
          type: string
          format: date-time
      required:
        - id
        - title
        - stage
        - createdAt
        - updatedAt

    CreateDealBody:
      type: object
      properties:
        title:
          type: string
        value:
          type: ["number", "null"]
        stage:
          type: string
          enum: [prospecting, qualification, proposal, negotiation, closed_won, closed_lost]
        contactId:
          type: ["integer", "null"]
        companyId:
          type: ["integer", "null"]
        closeDate:
          type: ["string", "null"]
          format: date
        notes:
          type: ["string", "null"]
      required:
        - title
        - stage

    UpdateDealBody:
      type: object
      properties:
        title:
          type: string
        value:
          type: ["number", "null"]
        stage:
          type: string
          enum: [prospecting, qualification, proposal, negotiation, closed_won, closed_lost]
        contactId:
          type: ["integer", "null"]
        companyId:
          type: ["integer", "null"]
        closeDate:
          type: ["string", "null"]
          format: date
        notes:
          type: ["string", "null"]

    Activity:
      type: object
      properties:
        id:
          type: integer
        type:
          type: string
          enum: [call, email, meeting, note, task]
        title:
          type: string
        description:
          type: ["string", "null"]
        contactId:
          type: ["integer", "null"]
        contactName:
          type: ["string", "null"]
        dealId:
          type: ["integer", "null"]
        dealTitle:
          type: ["string", "null"]
        dueDate:
          type: ["string", "null"]
          format: date-time
        completed:
          type: boolean
        createdAt:
          type: string
          format: date-time
        updatedAt:
          type: string
          format: date-time
      required:
        - id
        - type
        - title
        - completed
        - createdAt
        - updatedAt

    CreateActivityBody:
      type: object
      properties:
        type:
          type: string
          enum: [call, email, meeting, note, task]
        title:
          type: string
        description:
          type: ["string", "null"]
        contactId:
          type: ["integer", "null"]
        dealId:
          type: ["integer", "null"]
        dueDate:
          type: ["string", "null"]
          format: date-time
        completed:
          type: boolean
      required:
        - type
        - title

    UpdateActivityBody:
      type: object
      properties:
        type:
          type: string
          enum: [call, email, meeting, note, task]
        title:
          type: string
        description:
          type: ["string", "null"]
        contactId:
          type: ["integer", "null"]
        dealId:
          type: ["integer", "null"]
        dueDate:
          type: ["string", "null"]
          format: date-time
        completed:
          type: boolean

    DealStageGroup:
      type: object
      properties:
        stage:
          type: string
        count:
          type: integer
        totalValue:
          type: number
      required:
        - stage
        - count
        - totalValue

    DashboardSummary:
      type: object
      properties:
        totalContacts:
          type: integer
        totalCompanies:
          type: integer
        totalDeals:
          type: integer
        pipelineValue:
          type: number
        wonDealsValue:
          type: number
        openActivities:
          type: integer
        newContactsThisMonth:
          type: integer
        dealsClosingThisMonth:
          type: integer
      required:
        - totalContacts
        - totalCompanies
        - totalDeals
        - pipelineValue
        - wonDealsValue
        - openActivities
        - newContactsThisMonth
        - dealsClosingThisMonth
